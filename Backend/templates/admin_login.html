<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Portfolio</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Font Awesome icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c14;
      --surface:   #13131f;
      --card:      #1a1a2e;
      --border:    #2a2a45;
      --gold:      #c9a84c;
      --gold-light:#e8d5a3;
      --text:      #f0ede8;
      --muted:     #7a7a9a;
      --danger:    #e05c5c;
      --success:   #4caf82;
      --warning:   #e0a84c;
      --info:      #4a9eff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Animated background ──────────────────────────────────── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%,
        rgba(201,168,76,0.08) 0%, transparent 70%);
    }

    /* ── Login card ───────────────────────────────────────────── */
    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 1rem;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ─────────────────────────────────────────────────── */
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--gold), #8b6914);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #fff;
      margin-bottom: 1rem;
      box-shadow: 0 8px 24px rgba(201,168,76,0.3);
    }
    .logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }
    .logo p {
      color: var(--muted);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    /* ── Alerts (flash messages) ──────────────────────────────── */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .alert-danger  { background: rgba(224,92,92,0.15);  border: 1px solid rgba(224,92,92,0.3);  color: #f08080; }
    .alert-success { background: rgba(76,175,130,0.15); border: 1px solid rgba(76,175,130,0.3); color: #6fcca8; }
    .alert-warning { background: rgba(224,168,76,0.15); border: 1px solid rgba(224,168,76,0.3); color: #f0c060; }
    .alert-info    { background: rgba(74,158,255,0.15); border: 1px solid rgba(74,158,255,0.3); color: #70b8ff; }

    /* ── Form ─────────────────────────────────────────────────── */
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }
    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 1rem; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
      pointer-events: none;
      transition: color 0.2s;
    }
    .form-input {
      width: 100%;
      padding: 0.875rem 1rem 0.875rem 2.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: var(--muted); }
    .form-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
    }
    .form-input:focus + .input-icon,
    .input-wrap:focus-within .input-icon { color: var(--gold); }

    /* ── Submit button ────────────────────────────────────────── */
    .btn-login {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, var(--gold), #8b6914);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 8px 24px rgba(201,168,76,0.25);
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(201,168,76,0.35);
    }
    .btn-login:active { transform: translateY(0); opacity: 0.9; }

    /* ── Footer hint ──────────────────────────────────────────── */
    .login-hint {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .login-hint a {
      color: var(--gold);
      text-decoration: none;
    }
    .login-hint a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Background decorations -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- Login Card -->
  <div class="login-wrap">
    <div class="login-card">

      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
        <h1>Admin Portal</h1>
        <p>Sign in to manage your portfolio</p>
      </div>

      <!-- Flash Messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
              <i class="fas fa-circle-info"></i>
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Login Form -->
      <form method="POST" action="{{ url_for('admin.login') }}">

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrap">
            <input
              class="form-input"
              type="text"
              id="username"
              name="username"
              placeholder="Enter your username"
              required
              autocomplete="username"
            />
            <i class="fas fa-user input-icon"></i>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            />
            <i class="fas fa-lock input-icon"></i>
          </div>
        </div>

        <button type="submit" class="btn-login">
          <i class="fas fa-arrow-right-to-bracket"></i> Sign In
        </button>

      </form>

      <p class="login-hint">
        <a href="/">← Back to Portfolio</a>
      </p>
    </div>
  </div>

</body>
</html>
